name: ds-drones-backend
services:
  db:
    image: postgres:17
    container_name: ds-drones-database
    environment:
      POSTGRES_USER: ds-drones
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ds-drones
    ports:
      - "5432:5432"
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
  redis: 
    image: redis:7
    container_name: ds-drones-redis
    ports:
      - "6379:6379"
    volumes:
      - ./docker/data/redis:/data
